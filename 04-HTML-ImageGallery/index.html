<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    
        <style>
            table{
                border-collapse: collapse;
                width: 100%;
            }
            td{
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }
        .apply{
            width: 200px;
            height: 150px;
            border-radius: 50%;
            border: 10px dotted yellowgreen;
        }
       </style>
</head>
<body>
<h1 style="font-weight: 100;font-style:bold; color: red; margin-left: 650px;">Image Gallery</h1>
    <table>
        <tr>
            <td ><img src="https://www.w3schools.com/css/img_forest.jpg" alt="forest" class="apply" title="path">Path</td>
            <td><img src="https://www.w3schools.com/css/img_mountains.jpg" alt="mountains" class="apply" title="mountains">Mountains</td>
            <td><img src="https://images.pexels.com/photos/192136/pexels-photo-192136.jpeg" alt="forest" class="apply" title="forest">Forest</td>
        </tr>
        <tr>
            <td><img src="https://images.pexels.com/photos/1961778/pexels-photo-1961778.jpeg" alt="flower" class="apply" title="flower">Flower</td>
            <td><img src="https://images.pexels.com/photos/1864189/pexels-photo-1864189.jpeg" alt="tree" class="apply" title="tree">Tree</td>
            <td><img src="https://images.pexels.com/photos/699423/pexels-photo-699423.jpeg" alt="paddy" class="apply" title="paddy">Paddy</td>
        </tr>
    </table>
</body>
</html>
