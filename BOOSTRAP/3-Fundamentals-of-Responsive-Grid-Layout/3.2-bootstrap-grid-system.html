<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bootstrap Grid System</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <!-- Container -->
  <div class="container mt-5">

    <h1 class="text-center mb-4">
      Bootstrap Grid System
    </h1>

    <!-- Row -->
    <div class="row g-3">

      <!-- Column 1 -->
      <div class="col-sm-6 col-lg-3">
        <div class="bg-primary text-white p-4 text-center rounded">
          Column 1
        </div>
      </div>

      <!-- Column 2 -->
      <div class="col-sm-6 col-lg-3">
        <div class="bg-success text-white p-4 text-center rounded">
          Column 2
        </div>
      </div>

      <!-- Column 3 -->
      <div class="col-sm-6 col-lg-3">
        <div class="bg-warning text-dark p-4 text-center rounded">
          Column 3
        </div>
      </div>

      <!-- Column 4 -->
      <div class="col-sm-6 col-lg-3">
        <div class="bg-danger text-white p-4 text-center rounded">
          Column 4
        </div>
      </div>

    </div>

  </div>

</body>
</html>
