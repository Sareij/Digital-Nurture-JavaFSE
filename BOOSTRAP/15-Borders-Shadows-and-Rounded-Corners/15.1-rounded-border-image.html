<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Borders & Rounded Image</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5 text-center">

    <h1 class="mb-4">Borders & Rounded Corners</h1>

    <!-- Rounded Circle Image -->
    <img 
      src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300"
      class="border border-primary border-3 rounded-circle mb-4"
      alt="Profile Image">

    <!-- Box with shadow -->
    <div class="border border-dark shadow p-4 rounded">
      This box uses border, shadow, and rounded corners.
    </div>

  </div>

</body>
</html>
