<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bootstrap JavaScript Plugins</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <h1 class="text-primary mb-4">
      Bootstrap JavaScript Plugin
    </h1>

    <!-- Collapse Button -->
    <button
      class="btn btn-success"
      data-bs-toggle="collapse"
      data-bs-target="#demoContent">

      Toggle Content

    </button>

    <!-- Collapsible Content -->
    <div id="demoContent" class="collapse mt-3">

      <div class="card card-body">
        Bootstrap JavaScript Plugin is working successfully.
      </div>

    </div>

  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="../js/bootstrap.bundle.min.js"></script>

</body>
</html>
