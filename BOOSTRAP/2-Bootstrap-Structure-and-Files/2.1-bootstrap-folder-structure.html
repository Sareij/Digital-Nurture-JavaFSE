<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bootstrap Folder Structure</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <h1 class="text-primary mb-4">
      Bootstrap Folder Structure
    </h1>

    <table class="table table-bordered table-striped">

      <thead class="table-dark">
        <tr>
          <th>Folder</th>
          <th>Purpose</th>
        </tr>
      </thead>

      <tbody>

        <tr>
          <td>css</td>
          <td>
            Contains Bootstrap CSS files used for webpage styling.
          </td>
        </tr>

        <tr>
          <td>js</td>
          <td>
            Contains Bootstrap JavaScript files for interactive components.
          </td>
        </tr>

        <tr>
          <td>icons</td>
          <td>
            Contains Bootstrap Icons used in webpages.
          </td>
        </tr>

      </tbody>

    </table>

  </div>

</body>
</html>
