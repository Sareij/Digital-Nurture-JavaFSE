<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Four Column Layout</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <h1 class="text-center mb-4">
      Four Column Layout
    </h1>

    <div class="row g-3">

      <!-- Column 1 -->
      <div class="col-sm-3">
        <div class="bg-primary text-white text-center p-4 rounded">
          Column 1
        </div>
      </div>

      <!-- Column 2 -->
      <div class="col-sm-3">
        <div class="bg-success text-white text-center p-4 rounded">
          Column 2
        </div>
      </div>

      <!-- Column 3 -->
      <div class="col-sm-3">
        <div class="bg-warning text-dark text-center p-4 rounded">
          Column 3
        </div>
      </div>

      <!-- Column 4 -->
      <div class="col-sm-3">
        <div class="bg-danger text-white text-center p-4 rounded">
          Column 4
        </div>
      </div>

    </div>

  </div>

</body>
</html>
