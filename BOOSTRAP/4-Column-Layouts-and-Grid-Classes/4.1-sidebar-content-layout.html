<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sidebar Layout</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <div class="row">

      <!-- Sidebar -->
      <div class="col-md-3">

        <div class="bg-dark text-white p-4 rounded">
          <h3>Sidebar</h3>

          <ul class="list-unstyled">
            <li>Home</li>
            <li>Profile</li>
            <li>Settings</li>
            <li>Logout</li>
          </ul>
        </div>

      </div>

      <!-- Main Content -->
      <div class="col-md-9">

        <div class="bg-light p-4 border rounded">

          <h2>Main Content</h2>

          <p>
            This is the main content area using Bootstrap grid system.
          </p>

          <p>
            Sidebar occupies 3 columns and content occupies 9 columns.
          </p>

        </div>

      </div>

    </div>

  </div>

</body>
</html>
