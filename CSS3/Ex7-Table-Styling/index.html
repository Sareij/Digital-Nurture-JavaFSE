<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Styling</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Page Header -->
    <header class="mainHeader">
        <h1>Local Community Event Portal</h1>
    </header>


    <!-- Event Admin Table -->
    <section class="tableSection">

        <h2>Event Management Table</h2>

        <table>

            <!-- Table Header -->
            <tr>
                <th>Event Name</th>
                <th>Date</th>
                <th>Location</th>
            </tr>


            <!-- Table Rows -->
            <tr>
                <td>Music Festival</td>
                <td>15 June 2026</td>
                <td>City Hall</td>
            </tr>

            <tr>
                <td>Food Carnival</td>
                <td>20 June 2026</td>
                <td>Community Park</td>
            </tr>

            <tr>
                <td>Art Exhibition</td>
                <td>25 June 2026</td>
                <td>Art Center</td>
            </tr>

            <tr>
                <td>Book Fair</td>
                <td>30 June 2026</td>
                <td>Public Library</td>
            </tr>

        </table>

    </section>

</body>
</html>
