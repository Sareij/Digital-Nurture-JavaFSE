<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography Styling</title>

    <!-- Google Font Link -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header Section -->
    <header class="mainHeader">
        <h1>Local Community Event Portal</h1>
    </header>


    <!-- Event Section -->
    <section class="eventSection">

        <div class="eventCard">

            <h2>Music Festival</h2>

            <p class="description">
                Join our grand music festival and enjoy live concerts,
                cultural performances, and entertainment programs with
                your local community members.
            </p>

        </div>


        <div class="eventCard">

            <h2>Food Carnival</h2>

            <p class="description">
                Experience delicious foods, exciting stalls, and
                fun-filled activities for families and friends.
            </p>

        </div>

    </section>

</body>
</html>
