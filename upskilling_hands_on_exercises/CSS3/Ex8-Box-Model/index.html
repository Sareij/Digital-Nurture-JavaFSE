<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model and Layout Control</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header Section -->
    <header class="mainHeader">
        <h1>Local Community Event Portal</h1>
    </header>


    <!-- Event Cards Section -->
    <section class="eventSection">

        <!-- Event Card 1 -->
        <div class="eventCard">
            <h2>Music Festival</h2>

            <p>
                Enjoy live music performances and cultural programs.
            </p>
        </div>


        <!-- Event Card 2 -->
        <div class="eventCard">
            <h2>Food Carnival</h2>

            <p>
                Taste delicious foods and enjoy family activities.
            </p>
        </div>

    </section>


    <!-- Form Section -->
    <section class="formSection">

        <h2>Event Registration</h2>

        <form>

            <input type="text" placeholder="Enter Your Name">

            <br><br>

            <input type="email" placeholder="Enter Your Email">

        </form>

    </section>


    <!-- Visibility Hidden Example -->
    <div class="hiddenBox">
        This box uses visibility: hidden
    </div>


    <!-- Display None Example -->
    <div class="noneBox">
        This box uses display: none
    </div>

</body>
</html>
