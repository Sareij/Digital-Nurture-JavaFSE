<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Shadow & Rounded Card</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <h1 class="text-center mb-4">Shadow & Rounded Card</h1>

    <div class="row g-4">

      <!-- Card 1 -->
      <div class="col-md-4">

        <div class="card shadow p-3 text-center">

          <h3>Basic Card</h3>

          <p class="text-muted">
            This card uses normal shadow.
          </p>

          <button class="btn btn-primary rounded-pill">
            Click Me
          </button>

        </div>

      </div>

      <!-- Card 2 -->
      <div class="col-md-4">

        <div class="card shadow-lg p-3 text-center">

          <h3>Large Shadow</h3>

          <p class="text-muted">
            This card uses shadow-lg.
          </p>

          <button class="btn btn-success rounded-pill">
            View More
          </button>

        </div>

      </div>

      <!-- Card 3 -->
      <div class="col-md-4">

        <div class="card border p-3 text-center shadow">

          <h3>Border Card</h3>

          <p class="text-muted">
            This card combines border and shadow.
          </p>

          <button class="btn btn-danger rounded-pill">
            Explore
          </button>

        </div>

      </div>

    </div>

  </div>

</body>
</html>
