<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Button Groups & Toggle</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <h1 class="text-center mb-4">Button Groups & Toggle Buttons</h1>

    <!-- Button Group -->
    <div class="btn-group mb-4" role="group">

      <button class="btn btn-primary">Left</button>
      <button class="btn btn-primary">Middle</button>
      <button class="btn btn-primary">Right</button>

    </div>

    <hr>

    <!-- Toggle Buttons -->
    <div class="btn-group" role="group">

      <input type="checkbox" class="btn-check" id="check1">
      <label class="btn btn-outline-success" for="check1">Option 1</label>

      <input type="checkbox" class="btn-check" id="check2">
      <label class="btn btn-outline-success" for="check2">Option 2</label>

      <input type="checkbox" class="btn-check" id="check3">
      <label class="btn btn-outline-success" for="check3">Option 3</label>

    </div>

  </div>

</body>
</html>
