<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Responsive Sidebar</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <h1 class="text-center mb-4">Responsive Sidebar</h1>

    <div class="row">

      <!-- Sidebar (visible only md and above) -->
      <div class="col-md-3 d-none d-md-block">

        <div class="bg-dark text-white p-3 rounded">

          <h4>Sidebar</h4>

          <ul class="list-unstyled">
            <li>Dashboard</li>
            <li>Profile</li>
            <li>Settings</li>
            <li>Logout</li>
          </ul>

        </div>

      </div>

      <!-- Main Content -->
      <div class="col-12 col-md-9">

        <div class="bg-light p-4 border rounded">

          <h3>Main Content</h3>

          <p>
            Sidebar is hidden on mobile and visible on tablet and desktop screens.
          </p>

        </div>

      </div>

    </div>

  </div>

</body>
</html>
