<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard Colors</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <h1 class="text-center mb-4">Dashboard</h1>

    <div class="row g-4">

      <!-- Card 1 -->
      <div class="col-md-3">
        <div class="bg-primary text-white p-4 rounded text-center">
          <h4>Users</h4>
          <h2>120</h2>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="col-md-3">
        <div class="bg-success text-white p-4 rounded text-center">
          <h4>Sales</h4>
          <h2>85</h2>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="col-md-3">
        <div class="bg-warning text-dark p-4 rounded text-center">
          <h4>Orders</h4>
          <h2>45</h2>
        </div>
      </div>

      <!-- Card 4 -->
      <div class="col-md-3">
        <div class="bg-danger text-white p-4 rounded text-center">
          <h4>Errors</h4>
          <h2>5</h2>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
