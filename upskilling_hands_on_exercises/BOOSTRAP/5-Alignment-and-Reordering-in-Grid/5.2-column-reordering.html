<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Column Reordering</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <h1 class="text-center mb-4">
      Bootstrap Column Reordering
    </h1>

    <div class="row g-3">

      <!-- First Column -->
      <div class="col-md-6 order-md-2">

        <div class="bg-primary text-white p-5 text-center rounded">

          <h3>Column 1</h3>

          <p>
            This column appears second on medium screens and above.
          </p>

        </div>

      </div>

      <!-- Second Column -->
      <div class="col-md-6 order-md-1">

        <div class="bg-success text-white p-5 text-center rounded">

          <h3>Column 2</h3>

          <p>
            This column appears first on medium screens and above.
          </p>

        </div>

      </div>

    </div>

  </div>

</body>
</html>
