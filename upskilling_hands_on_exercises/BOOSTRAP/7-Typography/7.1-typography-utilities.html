<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bootstrap Typography</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <!-- Display Heading -->
    <h1 class="display-1 text-primary">
      Bootstrap Typography
    </h1>

    <!-- Lead Paragraph -->
    <p class="lead">
      This is a lead paragraph using Bootstrap typography utilities.
    </p>

    <!-- Muted Text -->
    <p class="text-muted">
      This text is muted.
    </p>

    <!-- Bold Text -->
    <p class="fw-bold">
      This text is bold.
    </p>

    <!-- Normal Paragraph -->
    <p>
      Bootstrap provides many typography utility classes.
    </p>

  </div>

</body>
</html>
