<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Spacing Utilities</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <h1 class="text-center mb-4">Spacing Utilities Demo</h1>

    <!-- Margin Example -->
    <div class="bg-primary text-white m-3 p-2">
      This box uses m-3 (margin) and p-2 (padding)
    </div>

    <!-- Margin Top Example -->
    <div class="bg-success text-white mt-4 p-3">
      This box uses mt-4 (margin-top) and p-3 padding
    </div>

    <!-- Padding Y Example -->
    <div class="bg-danger text-white py-5 text-center mt-4">
      This box uses py-5 (vertical padding)
    </div>

  </div>

</body>
</html>
