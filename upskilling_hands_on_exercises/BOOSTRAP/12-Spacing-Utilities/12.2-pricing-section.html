<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pricing Section</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container my-5">

    <h1 class="text-center mb-5">Pricing Plans</h1>

    <div class="row g-4">

      <!-- Basic Plan -->
      <div class="col-md-4">

        <div class="border rounded p-4 text-center shadow-sm h-100">

          <h3 class="mb-3">Basic</h3>

          <h2 class="text-primary mb-3">₹199</h2>

          <p class="text-muted">
            Suitable for beginners
          </p>

          <button class="btn btn-outline-primary mt-3">
            Choose Plan
          </button>

        </div>

      </div>

      <!-- Standard Plan -->
      <div class="col-md-4">

        <div class="border rounded p-4 text-center shadow h-100">

          <h3 class="mb-3">Standard</h3>

          <h2 class="text-success mb-3">₹499</h2>

          <p class="text-muted">
            Best for professionals
          </p>

          <button class="btn btn-success mt-3">
            Choose Plan
          </button>

        </div>

      </div>

      <!-- Premium Plan -->
      <div class="col-md-4">

        <div class="border rounded p-4 text-center shadow-lg h-100">

          <h3 class="mb-3">Premium</h3>

          <h2 class="text-danger mb-3">₹999</h2>

          <p class="text-muted">
            All features included
          </p>

          <button class="btn btn-danger mt-3">
            Choose Plan
          </button>

        </div>

      </div>

    </div>

  </div>

</body>
</html>
