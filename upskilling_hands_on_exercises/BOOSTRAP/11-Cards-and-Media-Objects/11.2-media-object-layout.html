<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Media Object Layout</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  <div class="container mt-5">

    <h1 class="text-center mb-4">Media Object Layout</h1>

    <!-- Media Object -->
    <div class="d-flex align-items-start p-3 border rounded shadow-sm">

      <!-- Image -->
      <img src="https://images.unsplash.com/photo-1522075469751-3a6694fb2f61?w=200" 
           class="me-3 rounded" 
           alt="Media Image">

      <!-- Content -->
      <div>

        <h5 class="mb-1">Media Heading</h5>

        <p class="mb-0 text-muted">
          This is a simple media object layout where the image is aligned to the left and text content is on the right using Bootstrap flex utilities.
        </p>

      </div>

    </div>

  </div>

</body>
</html>
