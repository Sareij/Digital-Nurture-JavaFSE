<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner{
            background-color: blue;
            color: white;
            margin: auto;
            padding: 20px;
        }
        .highlight{
            background-color: yellow;
            border: 2px solid black;
            font-weight: 100;
        }
    </style>
</head>
<body>
    <div id="welcomeBanner">
        <h1 >Welcome to Our Website!</h1>
        <p>We are glad to have you here. Explore our content and enjoy your stay!</p>
    </div>
    <span style="color: red;font-weight: 100;">Offer!!! huge discount!</span>
    <h1 class="highlight">Announcements!!!</h1>
    <p class="highlight">Don't miss out on our special offers and promotions!</p>
</body>
</html>
