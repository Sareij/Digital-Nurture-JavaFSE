<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Invite</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }

        form{
            width: 400px;
            border: 2px solid black;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            margin-left: 550px;
        }

        input, textarea{
            width: 90%;
            border-radius: 10px;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid black;
        }

        video{
            border: 2px solid black;
        }

        #videoMessage{
            color: green;
            font-weight: bold;
        }

    </style>

</head>
<body>

    <h2>Event Registration</h2>

    <form id="eventForm">

        <label>Name:</label>
        <input type="text" id="name">

        <label>Feedback:</label>
        <textarea id="feedback"></textarea>

        <button type="submit" style="border-radius: 10px;background-color: blue;color: white;width: 90%; height: 30px;">Submit</button>

    </form>

    <h2>Event Promo Video</h2>

    <video width="500"
           controls
           oncanplay="videoReady()">

        <source src="video.mp4" type="video/mp4">

        Your browser does not support video.

    </video>

    <p id="videoMessage"></p>

    <script>

        let formChanged = false;

        document.getElementById("name").addEventListener("input", function(){
            formChanged = true;
        });

        document.getElementById("feedback").addEventListener("input", function(){
            formChanged = true;
        });

        function videoReady(){

            document.getElementById("videoMessage").innerHTML =
            "Video ready to play";
        }

        window.onbeforeunload = function(){

            if(formChanged){

                return "You have unsaved changes!";
            }
        };

        document.getElementById("eventForm").onsubmit = function(){

            formChanged = false;
        };

    </script>

</body>
</html>
